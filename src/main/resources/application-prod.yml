spring:
  datasource:
    url: jdbc:mysql://YOUR_PRODUCTION_HOST:3306/ecommerce
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

    properties:
      hibernate:
        format_sql: false

    database-platform: org.hibernate.dialect.MySQLDialect